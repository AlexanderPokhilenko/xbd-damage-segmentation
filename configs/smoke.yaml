run_name: smoke_test
seed: 42
checkpoint_dir: ./checkpoints

data:
  root: ./xbd_processed
  tile_size: 256

training:
  epochs: 2
  batch_size: 4
  num_workers: 0
  amp: false
  early_stop_patience: 999
  optimizer:
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
  loss:
    dice_weight: 0.5
    pos_weight: null

model:
  name: unet_smp
  params:
    encoder_name: resnet34
    encoder_weights: imagenet
    in_channels: 3
    classes: 1
